apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: mf-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ardamutlu/auth:latest
          ports:
            - containerPort: 80
          env:
            - name: host_redirect
              valueFrom:
                configMapKeyRef:
                  name: global-mf-config
                  key: host_redirect
          volumeMounts:
            - mountPath: /etc/nginx/conf.d/default.conf.template
              subPath: default.conf.template
              name: nginx-config
      volumes:
        - name: nginx-config
          configMap:
            name: auth-nginx-config
