apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mf-ingress
  namespace: mf-workspace
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: srv-host.onrender.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: host-service
                port:
                  number: 80
    - host: dashboard.myapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
    - host: auth.myapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
