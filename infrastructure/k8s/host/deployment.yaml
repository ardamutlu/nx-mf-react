apiVersion: apps/v1
kind: Deployment
metadata:
  name: host-deployment
  namespace: mf-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: host
  template:
    metadata:
      labels:
        app: host
    spec:
      containers:
        - name: host
          image: ardamutlu/host:latest
          ports:
            - containerPort: 80
