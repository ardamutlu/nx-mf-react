name: CI/CD Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'packages/common-react-ui/**'
      - 'apps/host/**'
      - 'apps/auth/**'
      - 'apps/dashboard/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/ardamutlu
  HOST_REDIRECT: ${{ vars.HOST_REDIRECT }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ auth, dashboard, host ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push ${{ matrix.app }} image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ matrix.app }}:latest \
            --build-arg APP_NAME=${{ matrix.app }} \
            --build-arg HOST_REDIRECT=${{ env.HOST_REDIRECT }} \
            -f apps/${{ matrix.app }}/Dockerfile \
            .
          docker push ${{ env.REGISTRY }}/${{ matrix.app }}:latest

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Deploying ${{ matrix.app }} to Render..."
          curl -X POST "https://api.render.com/deploy/srv-${{ matrix.app }}" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json"

  npm-publish:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v3

      - name: Check changed paths
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: '{"common-react-ui":["packages/common-react-ui/**"]}'

      - name: Publish common-react-ui
        if: steps.changes.outputs.common-react-ui == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./packages/common-react-ui --access public

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        run: kubectl apply -k infrastructure/k8s
