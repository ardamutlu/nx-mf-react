name: CI/CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'packages/common-react-ui/**'
      - 'apps/host/**'
      - 'apps/auth/**'
      - 'apps/dashboard/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HOST_REDIRECT: ${{ vars.HOST_REDIRECT }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: |
          docker build -t ardamutlu/host:latest ./apps/host --build-arg HOST_REDIRECT=${HOST_REDIRECT}
          docker build -t ardamutlu/auth:latest ./apps/auth --build-arg HOST_REDIRECT=${HOST_REDIRECT}
          docker build -t ardamutlu/dashboard:latest ./apps/dashboard --build-arg HOST_REDIRECT=${HOST_REDIRECT}

      - name: Push Docker images
        run: |
          docker push ardamutlu/host:latest
          docker push ardamutlu/auth:latest
          docker push ardamutlu/dashboard:latest

      - name: Check changed paths
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: '{"common-react-ui":["packages/common-react-ui/**"]}'

      - name: Publish common-react-ui
        if: steps.changes.outputs.common-react-ui == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./packages/common-react-ui --access public

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.30.0'

      - name: Deploy to Kubernetes
        run: kubectl apply -k infrastructure/k8s
